<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"> <!-- Khai bao namespace de dung th:* -->

<head>
    <meta charset="UTF-8">
    <title>List View</title>
    <!-- CSS don gian -->
    <style>
        body { font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>

<body>
    <div>
        <h1>Tim kiem sinh vien</h1>
        <form action="/students/search" method="GET">
            <input type="text" name="keyword" placeholder="Leave this field blank to show all students"/>
            <button type="submit">Tim kiem</button>
        </form>
    </div>
    <div>
        <h1 th:if="${isSearchResult} == false">Danh sach sinh vien</h1>
        <h1 th:unless="${isSearchResult} == false">Ket qua tim kiem</h1>
        <!--    <div th:if="${emptyKeyword}">Keyword is empty, so here's full list:</div>-->
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Ho va ten</th>
                    <th>Email</th>
                    <th>Tuoi</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <!-- Cu phap Thymeleaf: Duyet qua danh sach "dsSinhVien" -->
                <!-- th:each="bien_tam : ${key_trong_model}" -->
                <tr th:each="student : ${dsSinhVien}"
                    th:style="${student.age}<18 ? 'color: red;' : 'color: black;'">
                    <td th:text="${student.id}">ID Mau</td>
                    <td th:text="${student.name}">Ten Mau</td>
                    <td th:text="${student.email}">Email Mau</td>
                    <td th:text="${student.age}">0</td>
                    <td><a th:href="@{/students/info/{id}(id=${student.id})}">View detail</a></td>
                </tr>
            </tbody>
        </table>
    </div>
    <div>
        <a href="/students/add"><button type="button">Add student</button></a>
    </div>
</body>

</html>
